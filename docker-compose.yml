services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
    env_file:
      - .env.dev
    command: /bin/sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      - db
      - ollama
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-pull-llama:
    image: ollama/ollama:latest
    container_name: ollama-pull-llama-dev
    volumes:
      - ollama_data:/root/.ollama
    env_file:
      - .env.dev
    entrypoint: /bin/sh
    command: "-c 'sleep 5; ollama pull ${OLLAMA_MODEL:-llama3.2:1b}'"
    depends_on:
      - ollama

volumes:
  postgres_data:
  ollama_data:
