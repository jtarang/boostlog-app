name: CD

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # github.repository returns username/repo automatically
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test Integrity Pre-Build
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: Run Tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest httpx playwright
          python -m playwright install --with-deps
          echo "AWS_REGION=us-east-1" > .env
          echo "SKIP_AWS_FETCH=true" >> .env
          echo "SECRET_KEY=secure_testing_key_123" >> .env
          mkdir -p data/uploads
          python -m pytest tests/

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
