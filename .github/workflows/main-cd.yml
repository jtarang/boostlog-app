name: CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'main.py'
      - 'static/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'requirements.txt'
      - 'tests/**'
      - '.dockerignore'
      - '.github/workflows/main-cd.yml'
      - 'release-trigger'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jtarang/boostlog-app

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    environment: prd
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test Integrity Pre-Build
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.4"
          cache: "pip"
      
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Run Tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest httpx playwright
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            python -m playwright install chromium --with-deps
          else
            python -m playwright install-deps chromium
          fi
          echo "AWS_REGION=us-east-1" > .env
          echo "SKIP_AWS_FETCH=true" >> .env
          echo "SECRET_KEY=secure_testing_key_123" >> .env
          mkdir -p data/uploads
          python -m pytest tests/

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Configure AWS Credentials for SSM
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Trigger EC2 Deployment via SSM
        run: |
          # Get SHA from github context
          SHA_TAG="sha-${GITHUB_SHA::7}"
          
          # Send SSM command to EC2 target
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Name,Values=boostlog-web-prd" \
            --parameters "commands=[
              \"cd /app\",
              \"sudo mkdir -p /app/data\",
              \"sudo chown -R 1000:1000 /app/data\",
              \"which jq > /dev/null || sudo apt-get update -y\",
              \"which jq > /dev/null || sudo apt-get install -y jq\",
              \"wget -q --header='Authorization: token ${{ secrets.GITHUB_TOKEN }}' -O docker-compose.yml https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/docker-compose.prd.yml\",
              \"echo ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin\",
              \"docker pull ghcr.io/jtarang/boostlog-app:$SHA_TAG\",
              \"docker-compose down\",
              \"aws secretsmanager get-secret-value --secret-id boostlog/prd/secrets --query SecretString --output text | jq -r 'to_entries[] | .key + \\\"=\\\" + (.value|tostring)' > .env.production\",
              \"echo IMAGE_TAG=$SHA_TAG >> .env.production\",
              \"docker-compose --env-file .env.production up -d --force-recreate\"
            ]" \
            --comment "Deploying ghcr.io/jtarang/boostlog-app:$SHA_TAG to production"

