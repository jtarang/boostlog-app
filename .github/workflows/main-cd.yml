name: CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'main.py'
      - 'static/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'requirements.txt'
      - 'tests/**'
      - '.dockerignore'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jtarang/boostlog-app

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test Integrity Pre-Build
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: Run Tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest httpx playwright
          python -m playwright install --with-deps
          echo "AWS_REGION=us-east-1" > .env
          echo "SKIP_AWS_FETCH=true" >> .env
          echo "SECRET_KEY=secure_testing_key_123" >> .env
          mkdir -p data/uploads
          python -m pytest tests/

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Configure AWS Credentials for SSM
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Trigger EC2 Deployment via SSM
        run: |
          # Get SHA from github context
          SHA_TAG="sha-${GITHUB_SHA::7}"
          
          # Send SSM command to EC2 target
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Name,Values=boostlog-web-prd" \
            --parameters 'commands=[
              "cd /app",
              "wget -q --header=\"Authorization: token ${{ secrets.GITHUB_TOKEN }}\" -O docker-compose.yml https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/docker-compose.yml",
              "docker pull ghcr.io/jtarang/boostlog-app:'$SHA_TAG'",
              "IMAGE_TAG='$SHA_TAG' docker-compose up -d"
            ]' \
            --comment "Deploying ghcr.io/jtarang/boostlog-app:$SHA_TAG to production"

