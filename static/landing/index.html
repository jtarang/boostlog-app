<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>boostLog — Datalogs that tune themselves</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0B0E14;
      --surface: #121620;
      --surface2: #181C25;
      --border: #2A303F;
      --border2: #343d52;
      --accent: #8338EC;
      --accent-glow: rgba(131, 56, 236, 0.4);
      --pink: #FF006E;
      --pink-dim: rgba(255, 0, 110, 0.10);
      --danger: #FF006E;
      --success: #38B000;
      --purple: #8338EC;
      --orange: #f59e0b;
      --text: #E0E4EB;
      --muted: #8B94A5;
      --muted2: #556070;
      --font-head: 'Inter', sans-serif;
      --font-head2: 'Outfit', sans-serif;
      --font-mono: 'Inter', monospace;
      --card-radius: 16px;
      --grad: linear-gradient(135deg, #8338EC, #FF006E);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    ::selection {
      background: var(--pink-dim);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5vw;
      height: 64px;
      background: rgba(11, 13, 17, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: border-color 0.3s;
    }

    .nav-logo img {
      height: 36px;
      width: auto;
      display: block;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .nav-cta {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      padding: 0.45rem 1.1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-head);
      text-decoration: none;
    }

    .btn-ghost:hover {
      border-color: var(--pink);
      color: var(--text);
      background: var(--pink-dim);
    }

    .btn-primary {
      background: var(--grad);
      border: none;
      color: #fff;
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-head);
      text-decoration: none;
      box-shadow: 0 0 24px rgba(131, 56, 236, 0.35);
    }

    .btn-primary:hover {
      opacity: 0.9;
      box-shadow: 0 0 36px rgba(131, 56, 236, 0.5);
      transform: translateY(-1px);
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 5vw 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(131, 56, 236, 0.08);
      border: 1px solid rgba(131, 56, 236, 0.3);
      color: var(--accent);
      padding: 0.3rem 0.9rem;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 2rem;
    }

    .hero-badge::before {
      content: '●';
      font-size: 0.6rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .hero h1 {
      font-size: clamp(2.8rem, 7vw, 6rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      text-wrap: balance;
      max-width: 900px;
      font-family: 'Outfit', sans-serif;
    }

    .hero h1 .accent-pink {
      background: linear-gradient(to right, #3A86FF, #d400ff, #FF006E);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero h1 .accent-green {
      color: var(--success);
    }

    .hero-sub {
      font-size: clamp(1rem, 1.8vw, 1.2rem);
      color: var(--muted);
      max-width: 540px;
      margin-bottom: 2.5rem;
      text-wrap: balance;
      line-height: 1.7;
    }

    .hero-ctas {
      display: flex;
      gap: 0.875rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .btn-large {
      padding: 0.8rem 2rem;
      font-size: 1rem;
      border-radius: 8px;
      font-weight: 600;
    }

    .hero-footnote {
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* CHART PREVIEW */
    .chart-wrapper {
      margin-top: 4rem;
      width: 100%;
      max-width: 1100px;
      position: relative;
    }

    .chart-glow {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(131, 56, 236, 0.07) 0%, rgba(131, 56, 236, 0.04) 50%, transparent 70%);
      pointer-events: none;
    }

    .chart-frame {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6), 0 0 0 1px var(--border);
    }

    .chart-titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .chart-title {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .chart-dots {
      display: flex;
      gap: 6px;
    }

    .chart-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .chart-legend {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    canvas#heroChart {
      display: block;
      width: 100%;
      height: 240px;
    }

    .chart-metrics {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-top: 1px solid var(--border);
    }

    .metric-cell {
      padding: 14px 16px;
      border-right: 1px solid var(--border);
    }

    .metric-cell:last-child {
      border-right: none;
    }

    .metric-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .metric-value {
      font-size: 1.4rem;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      margin-top: 2px;
    }

    .metric-unit {
      font-size: 0.65rem;
      color: var(--muted);
    }

    /* SECTION SHARED */
    section {
      padding: 100px 5vw;
    }

    .section-label {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .section-label::before {
      content: '// ';
      color: var(--accent);
    }

    h2 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1rem;
      font-family: 'Outfit', sans-serif;
    }

    .section-sub {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 500px;
      text-wrap: balance;
      line-height: 1.7;
    }

    /* FEATURES */
    #features {
      background: var(--bg);
    }

    .features-header {
      text-align: center;
      margin-bottom: 4rem;
    }

    .features-header h2 {
      max-width: 700px;
      margin: 0 auto 1rem;
    }

    .features-header .section-sub {
      margin: 0 auto;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      max-width: 1100px;
      margin: 0 auto;
    }

    .feature-card {
      background: var(--surface2);
      padding: 2rem 2rem;
      transition: background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .feature-card:hover {
      background: #1d2130;
    }

    .feature-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, #3a86ff, #8338ec, transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .feature-card:hover::before {
      opacity: 1;
    }

    .feature-icon {
      width: 36px;
      height: 36px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .feature-card h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }

    .feature-card p {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.65;
    }

    /* HOW IT WORKS */
    #how {
      background: var(--surface);
    }

    .how-wrapper {
      max-width: 1100px;
      margin: 0 auto;
    }

    .how-header {
      margin-bottom: 4rem;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: var(--border);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .step {
      background: var(--bg);
      padding: 2.5rem 2rem;
      position: relative;
    }

    .step-num {
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      font-weight: 700;
      margin-bottom: 1.5rem;
      display: block;
    }

    .step h3 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    .step p {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.65;
    }

    .step-visual {
      margin-top: 1.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.8;
    }

    .step-visual .hi {
      color: var(--success);
    }

    .step-visual .hi2 {
      color: var(--orange);
    }

    .step-visual .hi3 {
      color: var(--accent);
    }

    /* AI SECTION */
    #ai {
      background: var(--bg);
      overflow: hidden;
    }

    .ai-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
    }

    .ai-bullets {
      list-style: none;
      margin-top: 2rem;
    }

    .ai-bullets li {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .ai-bullets li:last-child {
      border-bottom: none;
    }

    .ai-bullets li::before {
      content: '→';
      color: var(--accent);
      font-size: 0.8rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .ai-chat {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
    }

    .ai-chat-header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .ai-chat-title {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
    }

    .ai-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      color: #d400ff;
    }

    .ai-status::before {
      content: '●';
      font-size: 0.55rem;
      animation: pulse 2s infinite;
    }

    .ai-messages {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .msg-user,
    .msg-ai {
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.82rem;
      line-height: 1.6;
    }

    .msg-user {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      align-self: flex-end;
      max-width: 80%;
    }

    .msg-ai {
      background: rgba(131, 56, 236, 0.07);
      border: 1px solid rgba(131, 56, 236, 0.22);
      color: var(--text);
      align-self: flex-start;
      max-width: 90%;
    }

    .msg-ai strong {
      color: #d400ff;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .msg-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.6rem;
    }

    .msg-tag {
      background: rgba(131, 56, 236, 0.1);
      border: 1px solid rgba(212, 0, 255, 0.3);
      color: #d400ff;
      border-radius: 4px;
      padding: 0.15rem 0.5rem;
      font-size: 0.65rem;
    }

    /* PLATFORMS */
    .platforms-bar {
      background: var(--surface2);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 2rem 5vw;
      text-align: center;
    }

    .platforms-label {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .platforms-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 2rem;
    }

    .platform-pill {
      font-size: 0.8rem;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 0.4rem 1rem;
      border-radius: 100px;
      transition: all 0.2s;
      font-weight: 500;
    }

    .platform-pill:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    /* PRICING */
    #pricing {
      background: var(--bg);
    }

    .pricing-header {
      text-align: center;
      margin-bottom: 4rem;
    }

    .pricing-header h2 {
      margin-bottom: 0.75rem;
    }

    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      max-width: 1000px;
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .price-card {
      background: var(--surface);
      padding: 2.5rem 2rem;
      position: relative;
    }

    .price-card.featured {
      background: var(--surface2);
    }

    .price-card.featured::before {
      content: 'MOST POPULAR';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      background: var(--grad);
      color: #fff;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 0.25rem 0.9rem;
      border-radius: 0 0 6px 6px;
    }

    .price-tier {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .price-amount {
      display: flex;
      align-items: baseline;
      gap: 0.25rem;
      margin: 1rem 0 0.25rem;
    }

    .price-num {
      font-size: 3rem;
      font-weight: 700;
      font-family: var(--font-mono);
      letter-spacing: -0.04em;
    }

    .price-period {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .price-desc {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .price-features {
      list-style: none;
      margin-bottom: 2rem;
    }

    .price-features li {
      display: flex;
      gap: 0.6rem;
      align-items: flex-start;
      font-size: 0.85rem;
      padding: 0.45rem 0;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
    }

    .price-features li:last-child {
      border-bottom: none;
    }

    .price-features li::before {
      content: '✓';
      color: var(--success);
      font-weight: 700;
      flex-shrink: 0;
    }

    .price-features li.dim::before {
      color: var(--muted2);
      content: '–';
    }

    .price-features li.dim {
      color: var(--muted2);
    }

    .btn-outline {
      display: block;
      width: 100%;
      padding: 0.7rem;
      border: 1px solid var(--border2);
      background: none;
      color: var(--text);
      border-radius: 7px;
      font-family: var(--font-head);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-outline:hover {
      border-color: var(--pink);
      color: var(--pink);
    }

    .btn-full {
      display: block;
      width: 100%;
      padding: 0.7rem;
      background: var(--grad);
      border: none;
      color: #fff;
      border-radius: 7px;
      font-family: var(--font-head);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      text-decoration: none;
      box-shadow: 0 0 20px rgba(131, 56, 236, 0.3);
    }

    .btn-full:hover {
      opacity: 0.9;
      box-shadow: 0 0 30px rgba(131, 56, 236, 0.45);
    }

    /* FAQ */
    #faq {
      background: var(--surface);
    }

    .faq-wrapper {
      max-width: 720px;
      margin: 0 auto;
    }

    .faq-header {
      margin-bottom: 3rem;
    }

    .faq-item {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 0;
    }

    .faq-q {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.95rem;
      gap: 1rem;
      user-select: none;
    }

    .faq-q:hover {
      color: var(--text);
    }

    .faq-icon {
      color: var(--muted);
      font-size: 1.2rem;
      flex-shrink: 0;
      transition: transform 0.3s;
      font-family: var(--font-mono);
    }

    .faq-icon.open {
      transform: rotate(45deg);
      color: var(--accent);
    }

    .faq-a {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.75;
      padding-top: 0.75rem;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.3s;
    }

    .faq-a.open {
      max-height: 200px;
    }

    const { useState, useEffect, useRef } = React;

    /* ─── STATIC CHART ─── */
    function HeroChart() {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        // Seeded noise for natural tiny variance without waves
        function noise(seed) {
          let s = seed;
          return () => { s = (s * 16807 + 0) % 2147483647; return (s / 2147483647) - 0.5; };
        }

        function genBoost(n) {
          const rng = noise(42);
          return Array.from({ length: n }, (_, i) => {
            const t = i / n;
            // Aggressive dyno curve: lag then violent spool
            const spool = 1 / (1 + Math.exp(-35 * (t - 0.35)));
            const hold = 0.48 - 0.02 * Math.max(0, t - 0.6);
            return spool * hold - 0.04 + rng() * 0.008;
          });
        }
        function genAFR(n) {
          const rng = noise(77);
          return Array.from({ length: n }, (_, i) => {
            const t = i / n;
            // AFR dips rich aggressively as boost hits
            const spool = 1 / (1 + Math.exp(-30 * (t - 0.36)));
            const base = -0.10 - 0.15 * spool + 0.04 * Math.max(0, t - 0.65);
            return base + rng() * 0.015;
          });
        }
        function genTarget(n) {
          return Array.from({ length: n }, (_, i) => {
            const t = i / n;
            // Target steps up aggressively right before boost hits
            const ramp = 1 / (1 + Math.exp(-50 * (t - 0.30)));
            const hold = 0.50 - 0.01 * Math.max(0, t - 0.6);
            return ramp * hold;
          });
        }
        function genTorque(n) {
          const rng = noise(13);
          return Array.from({ length: n }, (_, i) => {
            const t = i / n;
            // Huge torque spike with the boost hit, then tapers off hard (classic dyno)
            const rise = 1 / (1 + Math.exp(-35 * (t - 0.35)));
            const peak = 1 - 0.65 * Math.max(0, t - 0.45);
            return rise * peak * 0.55 - 0.02 + rng() * 0.006;
          });
        }

        function draw() {
          const W = canvas.offsetWidth;
          const H = 240;
          ctx.clearRect(0, 0, W, H);
          const n = 200;
          const boost = genBoost(n);
          const afr = genAFR(n);
          const target = genTarget(n);

          // Grid & Realistic Axis Labels
          ctx.strokeStyle = 'rgba(255,255,255,0.04)';
          ctx.fillStyle = 'rgba(255,255,255,0.3)';
          ctx.font = '10px "Inter", sans-serif';
          ctx.lineWidth = 1;

          const gridSize = 40;
          const numRows = Math.floor(H / gridSize);
          const yLabels = ["30 psi", "24 psi", "18 psi", "12 psi", "6 psi", "0 psi", "-6 inHg"];

          for (let i = 0; i <= numRows; i++) {
            const y = i * gridSize;
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
            if (i < 6) ctx.fillText(yLabels[i], 8, y + 14);
          }

          const numCols = Math.floor(W / gridSize);
          for (let i = 0; i <= numCols; i++) {
            const x = i * gridSize;
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();

            // Label every 3rd vertical line to prevent crowding
            if (i > 0 && i % 3 === 0) {
              const rpm = Math.round(2500 + (x / W) * 4500);
              ctx.fillText(rpm + " rpm", x + 6, H - 8);
            }
          }

          // Zero line
          ctx.strokeStyle = 'rgba(255,255,255,0.08)';
          ctx.lineWidth = 1;
          ctx.setLineDash([4, 4]);
          ctx.beginPath(); ctx.moveTo(0, H * 0.72); ctx.lineTo(W, H * 0.72); ctx.stroke();
          ctx.setLineDash([]);

          // Draw line
          function drawLine(data, color, glowColor, lineW = 1.5) {
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, glowColor.replace('1)', '0.15)'));
            grad.addColorStop(0.5, 'transparent');

            // Fill area
            ctx.beginPath();
            data.forEach((v, i) => {
              const x = (i / (n - 1)) * W;
              const y = H * 0.88 - v * (H / 1.1);
              i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.lineTo(W, H * 0.72); ctx.lineTo(0, H * 0.72); ctx.closePath();
            ctx.fillStyle = grad; ctx.fill();

            // Line
            ctx.beginPath();
            ctx.shadowColor = glowColor; ctx.shadowBlur = 8;
            data.forEach((v, i) => {
              const x = (i / (n - 1)) * W;
              const y = H * 0.88 - v * (H / 1.1);
              i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.strokeStyle = color; ctx.lineWidth = lineW; ctx.stroke();
            ctx.shadowBlur = 0;
          }

          const torque = genTorque(n);
          drawLine(torque, 'rgba(131,56,236,0.8)', 'rgba(131,56,236,1)', 1.5);
          drawLine(target, 'rgba(232,49,122,0.5)', 'rgba(232,49,122,1)', 1.2);
          drawLine(boost, '#3A86FF', 'rgba(58,134,255,1)', 2.5);

        }

        function resize() {
          canvas.width = canvas.offsetWidth * window.devicePixelRatio;
          canvas.height = 240 * window.devicePixelRatio;
          canvas.style.height = '240px';
          ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
          draw();
        }

        resize();
        window.addEventListener('resize', resize);
        return () => window.removeEventListener('resize', resize);
      }, []);

      return <canvas ref={canvasRef} id="heroChart" style={{ width: '100%', height: '240px' }} />;
    }
